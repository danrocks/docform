version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: docform-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: docform
      POSTGRES_PASSWORD: docform
      POSTGRES_DB: docform
    volumes:
      - docform-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docform"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: docform-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-db}
      - DATABASE_URL=postgresql://docform:docform@db:5432/docform
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: docform-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  docform-pgdata:
  docform-data:
  docform-uploads:
